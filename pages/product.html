<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Product — AURIX</title>
  <link rel="stylesheet" href="../css/style.css">
  <link rel="icon" href="../assets/aurix-favicon.svg">
</head>
<body>

  <nav class="navbar">
    <a href="../index.html" class="logo"><img src="../assets/aurix-logo.svg" alt="AURIX" height="32"></a>
    <ul class="nav-links">
      <li><a href="../index.html" class="nav-back-home">Home</a></li>
      <li><a href="dashboard.html" id="navDashboard" style="display:none;">Dashboard</a></li>
      <li><a href="login.html" id="navSignin">Sign In</a></li>
    </ul>
  </nav>

  <div class="product-detail" id="productContent">
    <!-- Content loaded dynamically -->
  </div>

  <footer class="footer">
    <p>© 2026 AURIX. Built with ❤️ by Bhavik in Bengaluru.</p>
  </footer>

  <script src="../js/main.js"></script>
  <script>
    // Handle nav based on auth — runs immediately
    document.addEventListener('DOMContentLoaded', () => {
      const user = JSON.parse(localStorage.getItem('aurix_user') || 'null');
      const navDash = document.getElementById('navDashboard');
      const navSign = document.getElementById('navSignin');
      if (user) {
        navDash.style.display = '';
        navSign.style.display = 'none';
      } else {
        navDash.style.display = 'none';
        navSign.style.display = '';
      }
    });
  </script>
  <script src="../js/products.js"></script>
</body>
</html>
