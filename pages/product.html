<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Product — AURIX</title>
  <link rel="stylesheet" href="../css/style.css">
  <link rel="icon" href="../assets/aurix-favicon.svg">
</head>
<body>

  <nav class="navbar">
    <a href="../index.html" class="logo"><img src="../assets/aurix-logo.svg" alt="AURIX" height="32"></a>
    <ul class="nav-links">
      <li><a href="#" id="navHome">Home</a></li>
      <li><a href="#" id="navDashboard" style="display:none;">Dashboard</a></li>
      <li><a href="#" id="navSignin" style="display:none;">Sign In</a></li>
    </ul>
  </nav>

  <div class="product-detail" id="productContent">
    <!-- Content loaded dynamically -->
  </div>

  <footer class="footer">
    <p>© 2026 AURIX. Built with ❤️ by Bhavik in Bengaluru.</p>
  </footer>

  <script src="../js/main.js"></script>
  <script>
    // Smart nav — show correct links based on auth state
    document.addEventListener('DOMContentLoaded', () => {
      const user = JSON.parse(localStorage.getItem('aurix_user') || 'null');
      const navHome = document.getElementById('navHome');
      const navDashboard = document.getElementById('navDashboard');
      const navSignin = document.getElementById('navSignin');

      // Home always goes back to homepage
      navHome.href = '../index.html';

      if (user) {
        // Logged in — show Dashboard
        navDashboard.style.display = '';
        navDashboard.href = 'dashboard.html';
      } else {
        // Not logged in — show Sign In
        navSignin.style.display = '';
        navSignin.href = 'login.html';
      }
    });
  </script>
  <script src="../js/products.js"></script>
</body>
</html>
