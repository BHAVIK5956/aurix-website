<!DOCTYPE html>
<html lang="en" data-theme="dark">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Product — AURIX</title>
  <link rel="stylesheet" href="../css/style.css">
  <link rel="icon" href="data:image/svg+xml,<svg xmlns='http://www.w3.org/2000/svg' viewBox='0 0 100 100'><text y='.9em' font-size='90'>✨</text></svg>">
  <style>
    .product-detail { padding:100px 40px 60px; max-width:900px; margin:0 auto; }
    .back-link { display:inline-flex; align-items:center; gap:8px; color:var(--text-tertiary); font-size:0.9rem; margin-bottom:32px; cursor:pointer; transition:color var(--transition-fast); text-decoration:none; }
    .back-link:hover { color:var(--accent-primary); }
    .product-hero { text-align:center; margin-bottom:48px; }
    .product-hero .icon { width:80px; height:80px; border-radius:var(--radius-lg); background:var(--accent-glow); display:flex; align-items:center; justify-content:center; font-size:2.5rem; margin:0 auto 20px; }
    .product-hero h1 { margin-bottom:12px; }
    .product-hero .tagline { font-size:1.1rem; color:var(--text-tertiary); max-width:600px; margin:0 auto; }
    .product-stats { display:grid; grid-template-columns:repeat(auto-fit, minmax(150px, 1fr)); gap:16px; margin-bottom:48px; }
    .stat-card { background:var(--bg-card); border:1px solid var(--border-color); border-radius:var(--radius-md); padding:20px; text-align:center; }
    .stat-card .value { font-family:var(--font-heading); font-size:1.5rem; font-weight:700; color:var(--accent-primary); margin-bottom:4px; }
    .stat-card .label { font-size:0.8rem; color:var(--text-tertiary); }
    .product-section { margin-bottom:40px; }
    .product-section h3 { margin-bottom:16px; font-size:1.3rem; }
    .product-section p { line-height:1.8; margin-bottom:12px; }
    .tech-tags { display:flex; flex-wrap:wrap; gap:8px; }
    .tech-tag { padding:6px 14px; border-radius:50px; font-size:0.8rem; font-weight:600; background:var(--bg-tertiary); color:var(--text-secondary); }
    .install-steps { list-style:none; counter-reset:step; }
    .install-steps li { counter-increment:step; padding:16px 0; border-bottom:1px solid var(--border-color); display:flex; gap:16px; align-items:flex-start; }
    .install-steps li::before { content:counter(step); width:32px; height:32px; border-radius:50%; background:var(--accent-primary); color:white; display:flex; align-items:center; justify-content:center; font-weight:700; font-size:0.85rem; flex-shrink:0; }
    .user-types { display:grid; grid-template-columns:repeat(auto-fit, minmax(200px, 1fr)); gap:16px; }
    .user-type-card { background:var(--bg-card); border:1px solid var(--border-color); border-radius:var(--radius-md); padding:20px; text-align:center; }
    .user-type-card .emoji { font-size:2rem; margin-bottom:8px; }
    .user-type-card h4 { font-size:1rem; margin-bottom:4px; }
    .user-type-card p { font-size:0.8rem; color:var(--text-tertiary); }
    @media(max-width:768px) { .product-detail { padding:80px 20px 40px; } }
  </style>
</head>
<body>

  <button class="theme-toggle" id="themeToggle" aria-label="Toggle theme"><span class="theme-icon">🌙</span></button>

  <nav class="navbar">
    <a href="../index.html" class="logo">AURIX<span>.</span></a>
    <ul class="nav-links">
      <li><a href="dashboard.html">Dashboard</a></li>
      <li><a href="../index.html#products">Products</a></li>
    </ul>
  </nav>

  <div class="product-detail" id="productContent">
    <!-- Content loaded dynamically -->
  </div>

  <footer class="footer">
    <p>© 2026 AURIX. Built with ❤️ by Bhavik in Bengaluru.</p>
  </footer>

  <script src="../js/main.js"></script>
  <script src="../js/auth.js"></script>
  <script src="../js/products.js"></script>
</body>
</html>
