<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Sign In — AURIX</title>
  <meta name="description" content="Sign in to your AURIX account.">
  <link rel="stylesheet" href="../css/style.css">
  <link rel="icon" href="data:image/svg+xml,<svg xmlns='http://www.w3.org/2000/svg' viewBox='0 0 100 100'><text y='.9em' font-size='90'>✨</text></svg>">
</head>
<body>

  <button class="theme-toggle" id="themeToggle" aria-label="Toggle theme"><span class="theme-icon">🌙</span></button>

  <div class="login-page">
    <div class="login-card">
      <div class="login-logo">
        <a href="../index.html">AURIX<span>.</span></a>
      </div>

      <div class="login-tabs">
        <button class="login-tab active" data-tab="signin" onclick="switchTab('signin')">Sign In</button>
        <button class="login-tab" data-tab="signup" onclick="switchTab('signup')">Sign Up</button>
      </div>

      <div id="alertBox" class="alert"></div>

      <!-- Sign In Form -->
      <div id="signin-section" class="form-section active">
        <button class="login-btn" data-type="google" onclick="handleGoogleAuth()">
          <svg width="20" height="20" viewBox="0 0 24 24"><path d="M22.56 12.25c0-.78-.07-1.53-.2-2.25H12v4.26h5.92a5.06 5.06 0 0 1-2.2 3.32v2.77h3.57c2.08-1.92 3.28-4.74 3.28-8.1z" fill="#4285F4"/><path d="M12 23c2.97 0 5.46-.98 7.28-2.66l-3.57-2.77c-.98.66-2.23 1.06-3.71 1.06-2.86 0-5.29-1.93-6.16-4.53H2.18v2.84C3.99 20.53 7.7 23 12 23z" fill="#34A853"/><path d="M5.84 14.09c-.22-.66-.35-1.36-.35-2.09s.13-1.43.35-2.09V7.07H2.18C1.43 8.55 1 10.22 1 12s.43 3.45 1.18 4.93l2.85-2.22.81-.62z" fill="#FBBC05"/><path d="M12 5.38c1.62 0 3.06.56 4.21 1.64l3.15-3.15C17.45 2.09 14.97 1 12 1 7.7 1 3.99 3.47 2.18 7.07l3.66 2.84c.87-2.6 3.3-4.53 6.16-4.53z" fill="#EA4335"/></svg>
          Continue with Google
        </button>
        <button class="login-btn" data-type="github" onclick="handleGitHubAuth()">
          <svg width="20" height="20" viewBox="0 0 24 24" fill="currentColor"><path d="M12 2A10 10 0 0 0 2 12c0 4.42 2.87 8.17 6.84 9.5.5.08.66-.23.66-.5v-1.69c-2.77.6-3.36-1.34-3.36-1.34-.46-1.16-1.11-1.47-1.11-1.47-.91-.62.07-.6.07-.6 1 .07 1.53 1.03 1.53 1.03.89 1.52 2.34 1.08 2.91.83.09-.65.35-1.09.63-1.34-2.22-.25-4.55-1.11-4.55-4.92 0-1.11.38-2 1.03-2.71-.1-.25-.45-1.29.1-2.64 0 0 .84-.27 2.75 1.02.79-.22 1.65-.33 2.5-.33.85 0 1.71.11 2.5.33 1.91-1.29 2.75-1.02 2.75-1.02.55 1.35.2 2.39.1 2.64.65.71 1.03 1.6 1.03 2.71 0 3.82-2.34 4.66-4.57 4.91.36.31.69.92.69 1.85V21c0 .27.16.59.67.5C19.14 20.16 22 16.42 22 12A10 10 0 0 0 12 2z"/></svg>
          Continue with GitHub
        </button>

        <div class="login-divider"><span>or continue with email</span></div>

        <form id="signinForm" onsubmit="handleEmailSignIn(event)">
          <div class="form-group">
            <label for="signinEmail">Email address</label>
            <input class="form-input" type="email" id="signinEmail" placeholder="you@example.com" required>
          </div>
          <div class="form-group">
            <label for="signinPassword">Password</label>
            <input class="form-input" type="password" id="signinPassword" placeholder="••••••••" required minlength="6">
          </div>
          <button type="submit" class="btn btn-primary submit-btn">Sign In</button>
        </form>
      </div>

      <!-- Sign Up Form -->
      <div id="signup-section" class="form-section">
        <button class="login-btn" data-type="google" onclick="handleGoogleAuth()">
          <svg width="20" height="20" viewBox="0 0 24 24"><path d="M22.56 12.25c0-.78-.07-1.53-.2-2.25H12v4.26h5.92a5.06 5.06 0 0 1-2.2 3.32v2.77h3.57c2.08-1.92 3.28-4.74 3.28-8.1z" fill="#4285F4"/><path d="M12 23c2.97 0 5.46-.98 7.28-2.66l-3.57-2.77c-.98.66-2.23 1.06-3.71 1.06-2.86 0-5.29-1.93-6.16-4.53H2.18v2.84C3.99 20.53 7.7 23 12 23z" fill="#34A853"/><path d="M5.84 14.09c-.22-.66-.35-1.36-.35-2.09s.13-1.43.35-2.09V7.07H2.18C1.43 8.55 1 10.22 1 12s.43 3.45 1.18 4.93l2.85-2.22.81-.62z" fill="#FBBC05"/><path d="M12 5.38c1.62 0 3.06.56 4.21 1.64l3.15-3.15C17.45 2.09 14.97 1 12 1 7.7 1 3.99 3.47 2.18 7.07l3.66 2.84c.87-2.6 3.3-4.53 6.16-4.53z" fill="#EA4335"/></svg>
          Sign up with Google
        </button>
        <button class="login-btn" data-type="github" onclick="handleGitHubAuth()">
          <svg width="20" height="20" viewBox="0 0 24 24" fill="currentColor"><path d="M12 2A10 10 0 0 0 2 12c0 4.42 2.87 8.17 6.84 9.5.5.08.66-.23.66-.5v-1.69c-2.77.6-3.36-1.34-3.36-1.34-.46-1.16-1.11-1.47-1.11-1.47-.91-.62.07-.6.07-.6 1 .07 1.53 1.03 1.53 1.03.89 1.52 2.34 1.08 2.91.83.09-.65.35-1.09.63-1.34-2.22-.25-4.55-1.11-4.55-4.92 0-1.11.38-2 1.03-2.71-.1-.25-.45-1.29.1-2.64 0 0 .84-.27 2.75 1.02.79-.22 1.65-.33 2.5-.33.85 0 1.71.11 2.5.33 1.91-1.29 2.75-1.02 2.75-1.02.55 1.35.2 2.39.1 2.64.65.71 1.03 1.6 1.03 2.71 0 3.82-2.34 4.66-4.57 4.91.36.31.69.92.69 1.85V21c0 .27.16.59.67.5C19.14 20.16 22 16.42 22 12A10 10 0 0 0 12 2z"/></svg>
          Sign up with GitHub
        </button>

        <div class="login-divider"><span>or create account with email</span></div>

        <form id="signupForm" onsubmit="handleEmailSignUp(event)">
          <div class="form-group">
            <label for="signupName">Full Name</label>
            <input class="form-input" type="text" id="signupName" placeholder="Your name" required>
          </div>
          <div class="form-group">
            <label for="signupEmail">Email address</label>
            <input class="form-input" type="email" id="signupEmail" placeholder="you@example.com" required>
          </div>
          <div class="form-group">
            <label for="signupPassword">Password</label>
            <input class="form-input" type="password" id="signupPassword" placeholder="Min 6 characters" required minlength="6">
          </div>
          <button type="submit" class="btn btn-primary submit-btn">Create Account</button>
        </form>
      </div>

      <div class="login-footer">
        <p id="switchText">Don't have an account? <a href="#" onclick="switchTab('signup'); return false;">Sign up</a></p>
      </div>
    </div>
  </div>

  <script src="../js/main.js"></script>
  <script src="../js/auth.js"></script>
</body>
</html>
